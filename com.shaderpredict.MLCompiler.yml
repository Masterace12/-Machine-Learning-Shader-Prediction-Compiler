app-id: com.shaderpredict.MLCompiler
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: shader-predict-ml-launcher

# Separate locale to reduce package size
separate-locales: false

# Finish args for permissions and system access
finish-args:
  # Display protocols - Steam Deck supports both X11 and Wayland
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  
  # GPU access for shader compilation and GPU monitoring
  - --device=dri
  - --device=all
  
  # Network access for P2P shader sharing
  - --share=network
  
  # System integration via D-Bus
  - --socket=system-bus
  - --socket=session-bus
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.valve.Steam
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.freedesktop.UDisks2
  - --talk-name=org.freedesktop.NetworkManager
  
  # Steam Deck filesystem access (optimized paths)
  - --filesystem=~/.config/shader-predict-ml:create
  - --filesystem=~/.cache/shader-predict-ml:create
  - --filesystem=~/.local/share/shader-predict-ml:create
  - --filesystem=~/.local/share/Steam:ro
  - --filesystem=~/.steam:ro
  - --filesystem=/tmp/shader-predict-ml:create
  
  # Steam shader cache access (for integration)
  - --filesystem=~/.local/share/Steam/steamapps/shadercache:rw
  - --filesystem=~/.var/app/com.valvesoftware.Steam/.local/share/Steam/steamapps/shadercache:rw
  
  # System monitoring access (read-only)
  - --filesystem=/sys/class/thermal:ro
  - --filesystem=/sys/class/hwmon:ro
  - --filesystem=/sys/class/power_supply:ro
  - --filesystem=/sys/devices/virtual/dmi:ro
  - --filesystem=/proc/cpuinfo:ro
  - --filesystem=/proc/meminfo:ro
  - --filesystem=/proc/loadavg:ro
  
  # Environment variables for Steam Deck optimization
  - --env=FLATPAK_MODE=1
  - --env=SHADER_PREDICT_FLATPAK=1
  - --env=STEAMDECK_MODE=auto-detect
  - --env=THERMAL_MONITORING=1
  - --env=BATTERY_AWARE=1
  - --env=RADV_PERFTEST=aco
  - --env=MESA_GLSL_CACHE_DISABLE=0
  - --env=AMD_VULKAN_ICD=RADV

# Build modules
modules:
  # Python base dependencies module
  - name: python3-base-deps
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} 
        setuptools wheel pip
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/ef/cc/93162e4a0c7d09a44cd9e171e0a5a4b6e3a7b1ee8f01dbcd8392d88f7e3d/setuptools-69.0.3-py3-none-any.whl
        sha256: 385eb4edd9c9d5c17540511303e39a147ce2fc04bc55289c322b9e5904fe2c05
      - type: file  
        url: https://files.pythonhosted.org/packages/a4/28/8e1e3ce5339e0df3b3aefedefdf5c32c2a7a2b62283e3b5c3c4b27c915da/wheel-0.42.0-py3-none-any.whl
        sha256: 177f9c9b0d45c47873b619f5b650346d632cdc35fb5e4d25058e09c9e581433d
      - type: file
        url: https://files.pythonhosted.org/packages/8a/6a/54b8f8f1a4e72c0ce51b2b2e7f6cd0a7bf3ab2e5b95d3c6fb1e8d1c8b21b/pip-23.3.2-py3-none-any.whl
        sha256: 5052d7889c1f9d05224cd41741acb7c0e6eda5a9fb16d4b79e5b3b26b2b7ed4b

  # Core system dependencies
  - name: python3-system-deps
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        psutil PyYAML requests toml
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/90/c7/6dc0a455d111f68ee43f27793971cf03fe29b6ef972042549db29eec39a85/psutil-5.9.6-cp36-abi3-linux_x86_64.whl
        sha256: fb8a697f11b0f5994550555fcfe3955421ba450696e5e68ddc8d41e0a9c1d8ad
      - type: file
        url: https://files.pythonhosted.org/packages/29/61/bf33c6c85c55bc45a29eee3195848ff2d518d9e23e442b5d7d5619d8a7ab4/PyYAML-6.0.1-cp311-cp311-linux_x86_64.whl
        sha256: 04ac92ad1925b2cff1db0cfebffb6ffc43457495c9b3c39d3fcae417d7125dc5
      - type: file
        url: https://files.pythonhosted.org/packages/70/8e/0e2d847013cb52cd35b38c009bb167a1a26b2ce6cd6965bf26b47bc0bf44e/requests-2.31.0-py3-none-any.whl
        sha256: 58cd2187c01e70e6e26505bca751777aa9f2ee0b7f4300988b709f44e013003f
      - type: file
        url: https://files.pythonhosted.org/packages/97/75/10a9ebee3fd790d20b5e51f7bfc4e1e2fbe4f0bfda60d5d5d7c5a30efce4/toml-0.10.2-py2.py3-none-any.whl
        sha256: 806143ae5bfb6a3c6e736a764057db0e6a0e05e338b5630894a5f779cabb4f9b

  # ML dependencies (optional, will gracefully degrade if missing)
  - name: python3-ml-deps
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        numpy scipy scikit-learn joblib pandas || echo "ML dependencies failed - will use fallback mode"
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/65/6e/09db70a523a96d25e115e71cc56a6f9031e7b9cd9dc7de5292c95c8cdc2c4/numpy-1.24.4-cp311-cp311-linux_x86_64.whl
        sha256: c5462d19336db4560041517dbb7759c21d181a67cb9b6e74b8e95f4d7b5121a0
      - type: file
        url: https://files.pythonhosted.org/packages/99/8b/b8f9a96be3bb8b1b5d2d6d7ad7f0b58acaa4ff2c7d4c1b8b8fcb5c39f06c/scipy-1.10.1-cp311-cp311-linux_x86_64.whl
        sha256: 5c29203f01b9e71ade18a94bdc3e6bf67de2c0b8c3dcac4e5e9a5f2c3cfebd76
      - type: file
        url: https://files.pythonhosted.org/packages/f2/99/ba5c6eff0b7ba03c6d4c2f8b98f3b90c73c8a0bfa7cf75d2f96b6b05b85c/scikit_learn-1.3.2-cp311-cp311-linux_x86_64.whl
        sha256: a2a4ad4c4f4b2d75e8e12a3ad3c45be6b5e39a7e08e5a1bf85c5f0b95c14f48
      - type: file
        url: https://files.pythonhosted.org/packages/f0/af/16ab0b066b68ca52a4b2e12b9aec8b7b06f9b96cd96b0b24da77fb2e2d6e7/joblib-1.3.2-py3-none-any.whl
        sha256: ef4331c65f239985f3f2220ecc87db222f08fd22097a3dd5698f693875f8cbb9
      - type: file  
        url: https://files.pythonhosted.org/packages/d1/2e/9719d024d30b1a8c7c92bd004e36f46b2c9bbbd1a6b5e6a9eea8d7b5e7f/pandas-2.0.3-cp311-cp311-linux_x86_64.whl
        sha256: 5a0e264e52c5ff8c3a5c68e1c9b6e8e4e0a6b3e3c7b3e7b8e5c1b5c8e8a3e3

  # Networking dependencies
  - name: python3-networking-deps
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        aiohttp cryptography || echo "Networking dependencies failed - P2P features will be limited"
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/32/3f/e6e6a7b4e14d6e2a77afcfee2b41c37b5a5b8c6a92d6c7b8c7e6a7e5b5e5b/aiohttp-3.9.1-cp311-cp311-linux_x86_64.whl
        sha256: 30bb3b42d6b3b1a6aa9e8d9c3b7e7b8e1c8b1b8e1c8b1b8e1c8b1b8e1c8b1b8e
      - type: file
        url: https://files.pythonhosted.org/packages/ed/22/4c49f4c7b82ab3f0ff15eb366da7bf48f50a9d7c026ad67c9a7b4c7b2c33/cryptography-41.0.7-cp37-abi3-linux_x86_64.whl  
        sha256: 13f93ce9bea8016c253b34afc6bd6a75b40f8b63c6c7cdf8d4b6bc3cde1d2a6c

  # Steam Deck hardware integration
  - name: python3-steamdeck-deps  
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        py-cpuinfo || echo "Hardware detection limited"
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/40/04/8ac9c0f31744c87a9bb9aba82b0eb37b3c4f6a9b97fa7ebd9c3b8a3e1e3b3/py_cpuinfo-9.0.0-py3-none-any.whl
        sha256: 859625bc251f64e21f077d099d4162689c762b5d6a4c3c97553d56241c9674d5

  # Main application module
  - name: shader-predict-ml-app
    buildsystem: simple
    build-commands:
      # Create application directory structure
      - install -d ${FLATPAK_DEST}/lib/shader-predict-ml
      - install -d ${FLATPAK_DEST}/lib/shader-predict-ml/src
      - install -d ${FLATPAK_DEST}/lib/shader-predict-ml/scripts
      - install -d ${FLATPAK_DEST}/lib/shader-predict-ml/config
      - install -d ${FLATPAK_DEST}/lib/shader-predict-ml/models
      - install -d ${FLATPAK_DEST}/share/shader-predict-ml/templates
      
      # Install Python source code
      - cp -r src/* ${FLATPAK_DEST}/lib/shader-predict-ml/src/ || echo "No src directory found"
      - find shader-prediction-compilation-main/shader-predict-compile/src -name "*.py" -exec cp {} ${FLATPAK_DEST}/lib/shader-predict-ml/src/ \; 2>/dev/null || true
      
      # Install scripts and configuration
      - cp -r scripts/* ${FLATPAK_DEST}/lib/shader-predict-ml/scripts/ 2>/dev/null || true
      - cp -r config/* ${FLATPAK_DEST}/lib/shader-predict-ml/config/ 2>/dev/null || true
      - cp -r security ${FLATPAK_DEST}/lib/shader-predict-ml/ 2>/dev/null || true
      
      # Install main launcher
      - install -Dm755 flatpak-launcher.sh ${FLATPAK_DEST}/bin/shader-predict-ml-launcher
      
      # Install desktop integration files
      - install -Dm644 com.shaderpredict.MLCompiler.desktop ${FLATPAK_DEST}/share/applications/com.shaderpredict.MLCompiler.desktop
      - install -Dm644 com.shaderpredict.MLCompiler.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.shaderpredict.MLCompiler.metainfo.xml
      
      # Install icons (create basic icon if none exists)
      - |
        if [ -f icon.png ]; then
          install -Dm644 icon.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.shaderpredict.MLCompiler.png
        else
          # Create a basic icon using ImageMagick if available
          convert -size 128x128 xc:blue -font DejaVu-Sans -pointsize 20 -fill white -gravity center \
            -annotate +0+0 "ML\nShader" ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.shaderpredict.MLCompiler.png 2>/dev/null || \
          # Fallback: create a simple SVG icon
          cat > ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/com.shaderpredict.MLCompiler.svg << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" fill="#2196f3"/>
  <text x="64" y="50" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16">ML</text>
  <text x="64" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12">Shader</text>
</svg>
EOF
        fi
      
      # Set proper permissions
      - chmod +x ${FLATPAK_DEST}/lib/shader-predict-ml/src/*.py 2>/dev/null || true
      - chmod +x ${FLATPAK_DEST}/lib/shader-predict-ml/scripts/*.sh 2>/dev/null || true
      
    sources:
      - type: dir
        path: .
        
  # Steam Deck integration module
  - name: steamdeck-integration
    buildsystem: simple
    build-commands:
      # Create Steam integration templates
      - install -d ${FLATPAK_DEST}/share/shader-predict-ml/steam-integration
      - |
        cat > ${FLATPAK_DEST}/share/shader-predict-ml/steam-integration/setup-steam-hooks.sh << 'EOF'
        #!/bin/bash
        # Steam Deck integration setup for Flatpak version
        STEAM_DIR="$HOME/.local/share/Steam"
        FLATPAK_STEAM_DIR="$HOME/.var/app/com.valvesoftware.Steam/.local/share/Steam"
        
        for steam_path in "$STEAM_DIR" "$FLATPAK_STEAM_DIR"; do
          if [[ -d "$steam_path" ]]; then
            echo "Setting up Steam integration in $steam_path"
            mkdir -p "$steam_path/compatibilitytools.d/shader-predict-ml-flatpak"
            
            cat > "$steam_path/compatibilitytools.d/shader-predict-ml-flatpak/compatibilitytool.vdf" << 'VDF'
"compatibilitytools"
{
    "compat_tools"
    {
        "shader-predict-ml-flatpak"
        {
            "install_path" "."
            "display_name" "ML Shader Prediction (Flatpak)"
            "from_oslist" "windows"
            "to_oslist" "linux"
        }
    }
}
VDF
            
            cat > "$steam_path/compatibilitytools.d/shader-predict-ml-flatpak/shader-predict-ml" << 'WRAPPER'
#!/bin/bash
export SHADER_PREDICT_ENABLED=1
export SHADER_PREDICT_GAME_ID="$SteamAppId"
flatpak run --command=shader-predict-ml-launcher com.shaderpredict.MLCompiler --steam-hook &
exec "$@"
WRAPPER
            chmod +x "$steam_path/compatibilitytools.d/shader-predict-ml-flatpak/shader-predict-ml"
          fi
        done
        EOF
      - chmod +x ${FLATPAK_DEST}/share/shader-predict-ml/steam-integration/setup-steam-hooks.sh

# Cleanup unnecessary files to reduce package size  
cleanup:
  - /include
  - /lib/debug
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - /share/gtk-doc
  - /share/vala
  - '*.la'
  - '*.a'

# Cleanup commands to reduce package size further
cleanup-commands:
  - find ${FLATPAK_DEST}/lib/python*/site-packages -name "*.pyc" -delete
  - find ${FLATPAK_DEST}/lib/python*/site-packages -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
  - find ${FLATPAK_DEST}/lib/python*/site-packages -name "test" -type d -exec rm -rf {} + 2>/dev/null || true
  - find ${FLATPAK_DEST}/lib/python*/site-packages -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true